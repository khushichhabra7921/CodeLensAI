project:
  default_path: sample_projects/calculator_app

reports:
  format: all
  output_dir: reports
  generate_pr_comment: true

analysis:
  skip_ai: true
  skip_tests: false
  track_history: true
  track_issue_trends: true

rules:
  max_function_lines: 30
  max_arguments: 5
  check_security: true
  allow_http_urls: false
  check_dependencies: true
  require_pinned_dependencies: true
  allow_editable_installs: false
  allow_http_dependencies: false

ignore:
  folders:
    - .git
    - .venv
    - venv
    - __pycache__
    - .pytest_cache
    - .mypy_cache
    - generated_tests
    - reports
    - node_modules
    - dist
    - build

  files: []