name: CodeLens AI Analysis

on:
  workflow_dispatch:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  analyze-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run CodeLens AI using config
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
        run: |
          python main.py analyze --config codelens.yml

      - name: Run generated pytest tests
        run: |
          python -m pytest generated_tests -v

      - name: Comment CodeLens summary on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- codelens-ai-pr-comment -->';
            const commentPath = 'reports/pr_comment.md';

            if (!fs.existsSync(commentPath)) {
              core.warning('CodeLens PR comment file was not found.');
              return;
            }

            const body = fs.readFileSync(commentPath, 'utf8');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });

            const existingComment = comments.data.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

      - name: Upload CodeLens reports
        uses: actions/upload-artifact@v4
        with:
          name: codelens-reports
          path: |
            reports/codelens_report.md
            reports/codelens_report.json
            reports/codelens_report.html
            reports/score_history.json
            reports/score_history.md
            reports/issue_trends.json
            reports/issue_trends.md
            reports/pr_comment.md