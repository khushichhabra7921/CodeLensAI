name: CodeLens AI Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  analyze-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run CodeLens AI
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
        run: |
          python main.py sample_projects/calculator_app

      - name: Run generated pytest tests
        run: |
          python -m pytest generated_tests -v

      - name: Upload CodeLens report
        uses: actions/upload-artifact@v4
        with:
          name: codelens-report
          path: reports/codelens_report.md